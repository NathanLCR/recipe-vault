<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Save, rate, and organize your favorite recipes with this beautiful recipe manager."
    />
    <title>Recipe Vault — Save & Rate Your Recipes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/recipe-vault/assets/index-Bm9Qq2dA.js"></script>
    <link rel="stylesheet" crossorigin href="/recipe-vault/assets/index-B-do8NIl.css">
  </head>
  <body class="loading">
    <!-- ─── Loading Screen ─── -->
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Recipe Vault…</div>
    </div>

    <!-- ─── Header ─── -->
    <header class="app-header" id="app-header">
      <div class="app-logo">
        <span class="material-symbols-rounded">menu_book</span>
        Recipe <span>Vault</span>
      </div>
      <div class="header-actions">
        <span class="sync-indicator" id="sync-indicator"></span>
        <button class="btn" id="btn-import" title="Import recipes">
          <span class="material-symbols-rounded">upload</span
          ><span class="label-text">Import</span>
        </button>
        <button class="btn" id="btn-export" title="Export recipes">
          <span class="material-symbols-rounded">download</span
          ><span class="label-text">Export</span>
        </button>
        <button class="btn btn-primary" id="btn-add-recipe">
          <span class="material-symbols-rounded">add</span
          ><span class="label-text">Add Recipe</span>
        </button>
        <input type="file" id="import-input" accept=".json" />
      </div>
    </header>

    <!-- ─── Main Container ─── -->
    <main class="app-container">
      <section class="stats-bar" id="stats-bar">
        <div class="stat-card">
          <span class="stat-label">Total Recipes</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Average Rating</span>
          <span class="stat-value" id="stat-avg-rating">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Top Cuisine</span>
          <span class="stat-value" id="stat-top-cuisine">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Tried / Want to Try</span>
          <span class="stat-value" id="stat-tried">0 / 0</span>
        </div>
      </section>

      <section class="toolbar" id="toolbar">
        <div class="search-box">
          <span class="material-symbols-rounded">search</span>
          <input
            type="text"
            id="search-input"
            placeholder="Search recipes…"
            autocomplete="off"
          />
        </div>
        <div class="filter-group">
          <select id="filter-cuisine">
            <option value="">All Cuisines</option>
          </select>
          <select id="filter-rating">
            <option value="">All Ratings</option>
            <option value="5">5 Stars</option>
            <option value="4">4+ Stars</option>
            <option value="3">3+ Stars</option>
            <option value="2">2+ Stars</option>
            <option value="1">1+ Stars</option>
            <option value="0">Unrated</option>
          </select>
          <select id="filter-status">
            <option value="">All Status</option>
            <option value="tried">Tried</option>
            <option value="want">Want to Try</option>
          </select>
        </div>
      </section>

      <section class="recipe-grid" id="recipe-grid"></section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <!-- ─── Add / Edit Modal ─── -->
    <div class="modal-overlay" id="add-modal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="add-modal-title">Add Recipe</h2>
          <button class="btn btn-icon" id="add-modal-close">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="tab-switcher">
            <button class="tab-btn active" data-tab="manual">
              Manual Entry
            </button>
            <button class="tab-btn" data-tab="quick">Quick Add (Paste)</button>
          </div>
          <div id="tab-manual">
            <form id="recipe-form" autocomplete="off">
              <input type="hidden" id="recipe-id" />
              <div class="form-group">
                <label for="recipe-title">Title *</label>
                <input
                  type="text"
                  id="recipe-title"
                  placeholder="e.g. Chicken Tikka Masala"
                  required
                />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="recipe-cuisine">Cuisine *</label>
                  <input
                    type="text"
                    id="recipe-cuisine"
                    placeholder="e.g. Indian, Italian"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="recipe-source">Source</label>
                  <input
                    type="text"
                    id="recipe-source"
                    placeholder="e.g. ChatGPT, YouTube"
                  />
                </div>
              </div>
              <div class="form-group">
                <label for="recipe-ingredients">Ingredients *</label>
                <textarea
                  id="recipe-ingredients"
                  placeholder="One ingredient per line&#10;e.g.&#10;2 chicken breasts&#10;1 cup basmati rice&#10;1 tsp cumin"
                  required
                ></textarea>
              </div>
              <div class="form-group">
                <label for="recipe-instructions">Instructions *</label>
                <textarea
                  id="recipe-instructions"
                  placeholder="One step per line&#10;e.g.&#10;Marinate chicken for 30 minutes&#10;Heat oil in a pan&#10;Cook until golden"
                  required
                ></textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="recipe-status">Status</label>
                  <select id="recipe-status">
                    <option value="want">Want to Try</option>
                    <option value="tried">Tried</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Rating</label>
                  <div class="stars stars-interactive" id="form-stars">
                    <span class="material-symbols-rounded" data-star="1"
                      >star</span
                    >
                    <span class="material-symbols-rounded" data-star="2"
                      >star</span
                    >
                    <span class="material-symbols-rounded" data-star="3"
                      >star</span
                    >
                    <span class="material-symbols-rounded" data-star="4"
                      >star</span
                    >
                    <span class="material-symbols-rounded" data-star="5"
                      >star</span
                    >
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label for="recipe-review">Review Note</label>
                <input
                  type="text"
                  id="recipe-review"
                  placeholder="Quick note about this recipe…"
                />
              </div>
            </form>
          </div>
          <div id="tab-quick" style="display: none">
            <div class="form-group">
              <label for="quick-paste">Paste recipe text</label>
              <textarea
                id="quick-paste"
                style="min-height: 220px"
                placeholder="Paste a full recipe from an AI assistant, blog, etc. The app will try to auto-parse the title, ingredients, and instructions."
              ></textarea>
              <p class="form-hint">
                Tip: Works best with clearly labeled sections like
                "Ingredients:" and "Instructions:" or numbered steps.
              </p>
            </div>
            <button class="btn btn-primary" id="btn-parse" style="width: 100%">
              <span class="material-symbols-rounded">auto_awesome</span> Parse
              Recipe
            </button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" id="add-cancel">Cancel</button>
          <button class="btn btn-primary" id="add-save">Save Recipe</button>
        </div>
      </div>
    </div>

    <!-- ─── Detail Modal ─── -->
    <div class="modal-overlay detail-modal" id="detail-modal">
      <div class="modal">
        <div class="modal-header">
          <h2>Recipe Details</h2>
          <button class="btn btn-icon" id="detail-close">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
        <div class="modal-body" id="detail-body"></div>
      </div>
    </div>

  </body>
</html>
